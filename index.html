<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu amor ❤️</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>Nosso tempo juntos</h1>
        <div id="contador">Carregando tempo...</div>
        
        <div class="mensagem-box">
            <h2 id="titulo-msg">Minha princesa...</h2>
            <div id="texto-maquina"></div> 
        </div>

        <div class="pergunta">
            <h3>Você me ama?</h3>
            <div class="botoes">
                <button onclick="responder('sim')">SIM</button>
                <button id="btn-nao" onmouseover="fuga()">NÃO</button>
            </div>
        </div>

        <div class="musica">
            <p>Nossa música ❤️</p>
            <audio id="player" controls autoplay loop>
                <source src="suamusica.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
