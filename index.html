<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu amor ❤️</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* MANTENDO SEU ESTILO ORIGINAL */
        body {
            background-color: #ffdee5; /* Cor de fundo suave */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            /* O SEU SOMBREADO QUE VOCÊ GOSTA */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            text-align: center;
            max-width: 500px;
            z-index: 10;
        }

        h1 { color: #ff4d6d; font-family: 'Dancing Script', cursive; font-size: 2.5rem; }
        
        .mensagem-box {
            margin: 20px 0;
            padding: 15px;
            border-left: 4px solid #ff4d6d;
            background: #fffafa;
            text-align: left;
        }

        /* BOTÕES ORIGINAIS */
        .botoes { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button[onclick*='sim'] { background: #ff4d6d; color: white; }
        #btn-nao { background: #bdc3c7; color: white; position: relative; }

        /* ADIÇÃO DAS POLAROIDS NO CANTO (SEM ATRAPALHAR O CENTRO) */
        .mural-polaroid {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
        }
        .polaroid {
            background: white;
            padding: 8px 8px 20px 8px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.2);
            width: 140px;
            margin-bottom: -15px;
            transform: rotate(5deg);
        }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; }
        .p2 { transform: rotate(-8deg); margin-right: 20px; }

        /* NOVO BOTÃO DA SAUDADE */
        .btn-saudade {
            margin-top: 25px;
            background: none;
            border: 1px solid #ff4d6d;
            color: #ff4d6d;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nosso tempo juntos</h1>
        <div id="contador">Calculando...</div>
        
        <div class="mensagem-box">
            <h2 id="titulo-msg">Minha princesa...</h2>
            <div id="texto-maquina">
                COLE AQUI O SEU TEXTO QUE VOCÊ DEMOROU MESES PARA ESCREVER ❤️
            </div>
        </div>

        <div class="pergunta">
            <h3>Você me ama?</h3>
            <div class="botoes">
                <button onclick="responderSim()">SIM</button>
                <button id="btn-nao" onmouseover="fuga()">NÃO</button>
            </div>
        </div>

        <button class="btn-saudade" onclick="enviarSaudade()">Estou com saudade ❤️</button>
    </div>

    <div class="mural-polaroid">
        <div class="polaroid p1"><img src="foto1.jpg"></div>
        <div class="polaroid p2"><img src="foto2.jpg"></div>
    </div>

    <script>
        // MANTIVE SUA LÓGICA DE FUGA
        function fuga() {
            const btn = document.getElementById('btn-nao');
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            btn.style.position = 'fixed';
        }

        function responderSim() {
            confetti({ particleCount: 150, spread: 70 });
            alert("Eu sabia! Também te amo muito! ❤️");
        }

        function enviarSaudade() {
            const scalar = 2;
            const heart = confetti.shapeFromPath({ path: 'M167 10c-75 0-75 78-75 78s0 78 75 78 75-78 75-78 0-78-75-78z' });
            confetti({ particleCount: 40, spread: 360, shapes: [heart], colors: ['#ff4d6d'] });
        }

        // Contador simples
        function atualizarContador() {
            const inicio = new Date("2023-01-01T00:00:00"); // Ajuste sua data!
            const dias = Math.floor((new Date() - inicio) / (1000 * 60 * 60 * 24));
            document.getElementById("contador").innerText = dias + " dias de puro amor";
        }
        atualizarContador();
    </script>
</body>
</html>
